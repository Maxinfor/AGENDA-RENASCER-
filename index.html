<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala Renascer - Completo</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-sec { background-color: #3498db; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="telaCadastro">
    <h1>Cadastrar Ensaio</h1>
    <input type="date" id="data">
    <input type="time" id="horario">
    <input type="text" id="musica" placeholder="Nome da música">
    <input type="text" id="integrante" placeholder="Nome do membro">
    <select id="funcao">
        <option value="Tecladista">Tecladista</option>
        <option value="Baterista">Baterista</option>
        <option value="Vocalista">Vocalista</option>
    </select>
    <button onclick="registrar()">Salvar Ensaio</button>
    <button class="btn-sec" onclick="alternarTela()">Ver Histórico</button>
</div>

<div class="container hidden" id="telaHistorico">
    <h1>Histórico</h1>
    <input type="text" id="busca" placeholder="Buscar música..." onkeyup="filtrar()">
    <table id="tabela">
        <thead><tr><th>Data</th><th>Música</th><th>Membro</th></tr></thead>
        <tbody id="corpoTabela"></tbody>
    </table>
    <button class="btn-sec" onclick="alternarTela()">Voltar ao Cadastro</button>
    <button style="background:#e74c3c; margin-top:10px" onclick="limparTudo()">Limpar Tudo</button>
</div>

<script>
    function alternarTela() {
        document.getElementById('telaCadastro').classList.toggle('hidden');
        document.getElementById('telaHistorico').classList.toggle('hidden');
        carregarTabela();
    }

    function registrar() {
        const novo = {
            data: document.getElementById('data').value,
            musica: document.getElementById('musica').value,
            nome: document.getElementById('integrante').value,
            funcao: document.getElementById('funcao').value
        };
        let banco = JSON.parse(localStorage.getItem('bancoEscala')) || [];
        banco.push(novo);
        localStorage.setItem('bancoEscala', JSON.stringify(banco));
        alert("Salvo!");
    }
