<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala Rápida Renascer</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 10px; }
        .grid-container { display: grid; grid-template-columns: 120px 1fr; gap: 10px; }
        .integrante-nome { font-weight: bold; align-self: center; }
        .selecao-funcao { display: flex; gap: 5px; flex-wrap: wrap; }
        .chip { padding: 8px; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: 0.7rem; background: #222; }
        .chip.active { background: var(--accent); color: #000; border-color: #fff; }
        :root { --accent: #00f2ff; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #25d366; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<h3>𝄞 ESCOLHER MÚSICA</h3>
<input type="text" id="musicaAtual" list="musicasList" placeholder="Qual música está editando?" style="width:100%; padding:10px;">
<datalist id="musicasList"></datalist>

<hr>

<div id="grid" class="grid-container" style="margin-top:20px;">
    <!-- O script vai gerar os nomes aqui -->
</div>

<button onclick="salvarEEnviar()">ENVIAR ESCALA NO WHATSAPP</button>

<script>
    const integrantes = ["Márcia", "Isabelle", "Estefany", "Paulinho", "Fernando", "Davi", "Max"];
    const funcoes = ["Cantor(a)", "Backing-vocal", "Guitarra", "Baixo", "Bateria", "Teclado"];
    let dadosEscala = {}; // Estrutura: { "Musica": { "Nome": "Funcao" } }

    // Gerar a tela automaticamente
    const grid = document.getElementById('grid');
    integrantes.forEach(nome => {
        grid.innerHTML += `<div class="integrante-nome">${nome}</div>`;
        let htmlFuncoes = `<div class="selecao-funcao" id="funcoes-${nome}">`;
        funcoes.forEach(f => {
            htmlFuncoes += `<div class="chip" onclick="selecionar('${nome}', '${f}', this)">${f}</div>`;
        });
        htmlFuncoes += `</div>`;
        grid.innerHTML += htmlFuncoes;
    });

    function selecionar(nome, func, el) {
        const musica = document.getElementById('musicaAtual').value;
        if(!musica) return alert("Escolha a música primeiro!");
        
        // Remove active de outros chips do mesmo integrante
        el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');

        if(!dadosEscala[musica]) dadosEscala[musica] = {};
        dadosEscala[musica][nome] = func;
    }

    function salvarEEnviar() {
        let msg = `*𝄞 ESCALA RENASCER*%0A%0A`;
        for(let m in dadosEscala) {
            msg += `*${m}*%0A`;
            for(let p in dadosEscala[m]) {
                msg += `• ${p}: ${dadosEscala[m][p]}%0A`;
            }
            msg += `%0A`;
        }
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
