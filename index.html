<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Pro | Renascer</title>
    <style>
        :root { --accent: #00f2ff; --bg: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        .musica-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        
        /* Grade adaptável */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .item-row { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .integrante-nome { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; color: var(--accent); }
        .selecao-funcao { display: flex; gap: 5px; flex-wrap: wrap; }
        .chip { padding: 6px 10px; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 0.75rem; background: #222; }
        .chip.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }
        
        .actions { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-limpar { background: #444; color: #fff; }
        .btn-enviar { background: #25d366; color: #000; }
        
        /* Lista de resumo devolvida */
        #resumo { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; font-size: 0.85rem; }
    </style>
</head>
<body>

<h3>𝄞 ESCOLHER MÚSICA</h3>
<input type="text" id="musicaAtual" class="musica-input" list="musicasList" placeholder="Digite ou selecione a música..." oninput="carregarConfiguracao()">
<datalist id="musicasList"></datalist>

<div id="grid" class="grid-container"></div>

<div class="actions">
    <button class="btn-limpar" onclick="limparTudo()">LIMPAR TUDO</button>
    <button class="btn-enviar" onclick="enviarWhatsApp()">ENVIAR (WhatsApp)</button>
</div>

<div id="resumo">
    <strong>Músicas configuradas:</strong>
    <div id="listaResumo" style="margin-top: 10px; line-height: 1.6;">Nenhuma música configurada ainda.</div>
</div>

<script>
    const integrantes = ["Márcia", "Isabelle", "Estefany", "Paulinho", "Fernando", "Davi", "Max"];
    const funcoes = ["Cantor(a)", "Backing-vocal", "Guitarra", "Baixo", "Bateria", "Teclado"];
    let dadosEscala = {};

    const grid = document.getElementById('grid');
    integrantes.forEach(nome => {
        grid.innerHTML += `
            <div class="item-row">
                <div class="integrante-nome">${nome}</div>
                <div class="selecao-funcao" id="funcoes-${nome}">
                    ${funcoes.map(f => `<div class="chip" onclick="toggleSelecao('${nome}', '${f}', this)">${f}</div>`).join('')}
                </div>
            </div>`;
    });

    function toggleSelecao(nome, func, el) {
        const musica = document.getElementById('musicaAtual').value;
        if(!musica) return alert("Digite o nome da música primeiro!");

        if(!dadosEscala[musica]) dadosEscala[musica] = {};
        if(!dadosEscala[musica][nome]) dadosEscala[musica][nome] = [];

        const idx = dadosEscala[musica][nome].indexOf(func);
        if(idx > -1) {
            dadosEscala[musica][nome].splice(idx, 1);
            el.classList.remove('active');
        } else {
            dadosEscala[musica][nome].push(func);
            el.classList.add('active');
        }
        atualizarResumo();
    }

    function carregarConfiguracao() {
        const musica = document.getElementById('musicaAtual').value;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));

        if(dadosEscala[musica]) {
            for(let nome in dadosEscala[musica]) {
                dadosEscala[musica][nome].forEach(func => {
                    const el = document.querySelector(`#funcoes-${nome} .chip:nth-child(${funcoes.indexOf(func) + 1})`);
                    if(el) el.classList.add('active');
                });
            }
        }
    }

    function atualizarResumo() {
        const lista = document.getElementById('listaResumo');
        const musicas = Object.keys(dadosEscala);
        lista.innerHTML = musicas.length > 0 ? musicas.map(m => `• <b>${m}</b>`).join('<br>') : "Nenhuma música configurada.";
    }

    function limparTudo() {
        if(confirm("Limpar toda a escala?")) {
            dadosEscala = {};
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            atualizarResumo();
            document.getElementById('musicaAtual').value = "";
        }
    }

    function enviarWhatsApp() {
        if(Object.keys(dadosEscala).length === 0) return alert("Adicione músicas!");
        let msg = `*𝄞 ESCALA RENASCER*%0A%0A`;
        for(let m in dadosEscala) {
            msg += `*${m}*%0A`;
            for(let p in dadosEscala[m]) {
                if(dadosEscala[m][p].length > 0) msg += `→ ${p}: ${dadosEscala[m][p].join(', ')}%0A`;
            }
            msg += `%0A`;
        }
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
