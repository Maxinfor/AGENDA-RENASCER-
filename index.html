<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer | Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>𝄞</text></svg>">
    <style>
        :root { --bg: #0a0a0a; --accent: #00f2ff; --card: #141414; --text: #ffffff; --input-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h2 { text-align: center; color: var(--accent); margin-bottom: 20px; font-size: 1.3rem; letter-spacing: 1px; }
        .row { margin-bottom: 12px; }
        label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select { width: 100%; background: var(--input-bg); border: 1px solid #444; padding: 12px; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; margin-top: 5px; transition: 0.2s; }
        .btn-add { background: #3a3a3a; color: #fff; border: 1px solid #555; }
        .btn-add:hover { background: #4a4a4a; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-wp { background: #25d366; color: white; margin-top: 20px; }
        .lista-container { margin: 15px 0; padding: 10px; background: #1a1a1a; border-radius: 6px; border: 1px solid #2a2a2a; }
        .item-badge { background: #333; padding: 6px 10px; border-radius: 4px; margin-bottom: 5px; font-size: 0.85rem; display: flex; justify-content: space-between; border: 1px solid #444; }
        span.remove { cursor: pointer; color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>𝄞 ESCALA RENASCER</h2>
    <div class="row"><label>DATA</label><input type="date" id="data"></div>
    <div class="row"><label>HORÁRIO</label><input type="time" id="horario"></div>
    
    <div class="row" style="display: flex; gap: 5px;">
        <div style="flex: 2;">
            <label>INTEGRANTE</label>
            <select id="selIntegrante">
                <option>Márcia</option><option>Isabelle</option><option>Estefany</option>
                <option>Paulinho</option><option>Fernando</option><option>Davi</option><option>Max</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label>FUNÇÃO</label>
            <select id="selFuncao">
                <option>Cantor(a)</option><option>Guitarra</option>
                <option>Baixo</option><option>Bateria</option><option>Teclado</option>
            </select>
        </div>
    </div>
    <button class="btn-add" onclick="addPessoa()">+ ADD INTEGRANTE</button>

    <div id="listaIntegrantes" class="lista-container"></div>

    <div class="row">
        <label>MÚSICA</label>
        <input type="text" id="inputMusica" list="musicasList" placeholder="Digite ou selecione...">
        <datalist id="musicasList"></datalist>
        <button class="btn-add" onclick="addMusica()">+ ADD MÚSICA</button>
    </div>
    <div id="listaMusicas" class="lista-container"></div>

    <button class="btn-save" onclick="salvarEscala()">SALVAR ESCALA</button>
    <button class="btn-wp" onclick="enviarWhatsApp()">ENVIAR VIA WHATSAPP</button>
</div>

<script>
    const musicasBase = ["Ousado Amor", "Galileu", "Vem me Buscar", "Aos Pés da Cruz", "Oceanos", "Que se Abram os Céus"];
    let listaPessoas = [];
    let listaMusicas = [];

    window.onload = () => {
        document.getElementById('data').valueAsDate = new Date();
        const datalist = document.getElementById('musicasList');
        musicasBase.forEach(m => datalist.innerHTML += `<option value="${m}">`);
    };

    function addPessoa() {
        const nome = document.getElementById('selIntegrante').value;
        const func = document.getElementById('selFuncao').value;
        listaPessoas.push({nome, func});
        renderizar();
    }

    function addMusica() {
        const input = document.getElementById('inputMusica');
        if(input.value) {
            listaMusicas.push(input.value);
            input.value = "";
            renderizar();
        }
    }

    function renderizar() {
        const divP = document.getElementById('listaIntegrantes');
        divP.innerHTML = "<strong>Equipe:</strong>";
        listaPessoas.forEach((p, i) => divP.innerHTML += `<div class="item-badge">${p.nome} - <i>${p.func}</i> <span class="remove" onclick="remP(${i})">✕</span></div>`);

        const divM = document.getElementById('listaMusicas');
        divM.innerHTML = "<strong>Músicas:</strong>";
        listaMusicas.forEach((m, i) => divM.innerHTML += `<div class="item-badge">${m} <span class="remove" onclick="remM(${i})">✕</span></div>`);
    }

    function remP(i) { listaPessoas.splice(i, 1); renderizar(); }
    function remM(i) { listaMusicas.splice(i, 1); renderizar(); }

    function salvarEscala() {
        const escala = {
            data: document.getElementById('data').value,
            horario: document.getElementById('horario').value,
            equipe: listaPessoas,
            musicas: listaMusicas
        };
        localStorage.setItem('escalaAtual', JSON.stringify(escala));
        alert("Escala salva!");
    }

    function enviarWhatsApp() {
        const e = JSON.parse(localStorage.getItem('escalaAtual'));
        if(!e) return alert("Salve primeiro!");
        
        let msg = `*𝄞 ESCALA RENASCER*%0AData: ${e.data}%0AHora: ${e.horario}%0A%0A*EQUIPE*%0A`;
        msg += e.equipe.map(x => `• ${x.nome}: ${x.func}`).join('%0A');
        msg += `%0A%0A*MÚSICAS*%0A`;
        msg += e.musicas.map(m => `♪ ${m}`).join('%0A');
        
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
