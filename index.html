<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala Renascer | Pro</title>
    <style>
        :root { --bg: #050505; --accent: #00f2ff; --border: #1a1a1a; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: #0d0d0d; padding: 25px; border: 1px solid var(--border); }
        .row { margin-bottom: 15px; }
        label { font-size: 0.65rem; color: #888; display: block; margin-bottom: 5px; }
        input, select { width: 100%; background: #111; border: 1px solid var(--border); padding: 10px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; margin-top: 5px; font-weight: 600; }
        .btn-add { background: #222; color: white; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-wp { background: #25d366; color: white; margin-top: 20px; }
        #listaMusicas { font-size: 0.8rem; margin: 15px 0; color: #aaa; }
        .badge { display: inline-block; background: #333; padding: 3px 8px; margin: 2px; border-radius: 4px; cursor: pointer; color: var(--accent); }
        .badge:hover { background: #444; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="card">
    <div class="row"><label>DATA (DD/MM/AAAA)</label><input type="text" id="data" placeholder="20/06/2026"></div>
    <div class="row"><label>HORÁRIO</label><input type="time" id="horario"></div>
    <div class="row"><label>INTEGRANTE</label>
        <select id="integrante">
            <option>Márcia</option><option>Isabelle</option><option>Estefany</option>
            <option>Paulinho</option><option>Fernando</option><option>Davi</option><option>Max</option>
        </select>
    </div>
    <div class="row"><label>FUNÇÃO</label>
        <select id="funcao">
            <option>Cantora</option><option>Cantor</option><option>Backing-vocal</option>
            <option>Guitarrista</option><option>Tecladista</option><option>Baterista</option><option>Baixista</option>
        </select>
    </div>
    <div class="row"><label>SELECIONAR MÚSICA</label>
        <select id="selectMusica"></select>
        <button class="btn-add" onclick="addMusica()">+ ADICIONAR MÚSICA</button>
    </div>
    
    <div id="listaMusicas"></div>

    <button class="btn-save" onclick="salvarEscala()">SALVAR ESCALA</button>
    <button class="btn-wp" onclick="enviarWhatsApp()">ENVIAR VIA WHATSAPP</button>
</div>
