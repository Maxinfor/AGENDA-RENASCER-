<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer - Profissional</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 25px; font-weight: 600; }
        label { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1.5px solid #edf1f0; border-radius: 10px; box-sizing: border-box; background: #fafafa; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; background: white; }
        button { width: 100%; padding: 14px; background-color: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #219150; transform: translateY(-2px); }
        .link-nav { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 600; opacity: 0.7; }
        .link-nav:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escala Renascer</h1>
    
    <label>Data</label>
    <input type="date" id="data">
    
    <label>Horário</label>
    <input type="time" id="horario">
    
    <label>Música</label>
    <input type="text" id="musica" placeholder="Nome da música">
    
    <label>Tom</label>
    <input type="text" id="tom" placeholder="Ex: Sol Maior">
    
    <label>Integrante</label>
    <input type="text" id="integrante" placeholder="Nome do membro">
    
    <label>Função</label>
    <select id="funcao">
        <option value="Tecladista">Tecladista</option>
        <option value="Baterista">Baterista</option>
        <option value="Vocalista">Vocalista</option>
        <option value="Baixista">Baixista</option>
        <option value="Guitarrista">Guitarrista</option>
        <option value="Violonista">Violonista</option>
        <option value="Backing vocal">Backing vocal</option>
    </select>

    <button onclick="registrar()">Cadastrar na Escala</button>
    <a href="historico.html" class="link-nav">Ver Histórico de Ensaios</a>
</div>

<script>
    function registrar() {
        const novoEnsaio = {
            id: Date.now(),
            data: document.getElementById('data').value,
            horario: document.getElementById('horario').value,
            musica: document.getElementById('musica').value,
            tom: document.getElementById('tom').value,
            nome: document.getElementById('integrante').value,
            funcao: document.getElementById('funcao').value
        };

        if(!novoEnsaio.data || !novoEnsaio.musica || !novoEnsaio.nome) {
            alert("Por favor, preencha os campos obrigatórios.");
            return;
        }

        let banco = JSON.parse(localStorage.getItem('bancoEscala')) || [];
        banco.push(novoEnsaio);
        localStorage.setItem('bancoEscala', JSON.stringify(banco));
        
        alert("Ensaio registrado com sucesso!");
        
        // Limpa apenas os campos de entrada, mantendo a função selecionada
        document.getElementById('musica').value = '';
        document.getElementById('tom').value = '';
        document.getElementById('integrante').value = '';
    }
</script>
</body>
</html>
