<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer | Pro</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #00f2ff; --card: #141414; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h2 { text-align: center; color: var(--accent); margin-bottom: 20px; }
        .row { margin-bottom: 12px; }
        label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin-bottom: 4px; display: block; }
        select, input { width: 100%; background: #1e1e1e; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .btn-add { background: #333; color: white; border: 1px solid #555; }
        .btn-wp { background: #25d366; color: white; margin-top: 20px; }
        .item-card { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .item-text { font-size: 0.9rem; margin: 2px 0; }
        .remove { float: right; color: #ff6b6b; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>𝄞 ESCALA RENASCER</h2>
    <div class="row"><label>DATA</label><input type="date" id="data"></div>
    
    <div class="row">
        <label>INTEGRANTE</label>
        <select id="selInt">
            <option>Márcia</option><option>Isabelle</option><option>Estefany</option>
            <option>Paulinho</option><option>Fernando</option><option>Davi</option><option>Max</option>
        </select>
    </div>
    <div class="row">
        <label>FUNÇÃO</label>
        <select id="selFunc">
            <option>Cantor(a)</option><option>Backing-vocal</option><option>Guitarra</option>
            <option>Baixo</option><option>Bateria</option><option>Teclado</option>
        </select>
    </div>
    <div class="row">
        <label>MÚSICA</label>
        <input type="text" id="inputMusica" placeholder="Ex: Galileu">
    </div>
    <button class="btn-add" onclick="addItem()">+ ADICIONAR À ESCALA</button>

    <div id="lista" style="margin-top:20px;"></div>

    <button class="btn-wp" onclick="enviarWhatsApp()">ENVIAR VIA WHATSAPP</button>
</div>

<script>
    let escala = [];

    function addItem() {
        const int = document.getElementById('selInt').value;
        const func = document.getElementById('selFunc').value;
        const mus = document.getElementById('inputMusica').value;
        if(!mus) return alert("Digite a música!");
        
        escala.push({int, func, mus});
        renderizar();
    }

    function renderizar() {
        const div = document.getElementById('lista');
        div.innerHTML = "<strong>Escala Detalhada:</strong><br><br>";
        escala.forEach((item, i) => {
            div.innerHTML += `
                <div class="item-card">
                    <span class="remove" onclick="remover(${i})">✕</span>
                    <div class="item-text" style="color: var(--accent)">${item.mus.toUpperCase()}</div>
                    <div class="item-text"><strong>${item.int}</strong> – ${item.func}</div>
                </div>`;
        });
    }

    function remover(i) { escala.splice(i, 1); renderizar(); }

    function enviarWhatsApp() {
        let data = document.getElementById('data').value;
        let msg = `*𝄞 ESCALA RENASCER*%0AData: ${data}%0A%0A`;
        escala.forEach(x => {
            msg += `*${x.mus}*%0A• ${x.int}: ${x.func}%0A%0A`;
        });
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
