<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escala Renascer | System</title>
    <style>
        :root { --bg: #050505; --panel: #0d0d0d; --accent: #00f2ff; --text: #e0e0e0; --border: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 450px; background: var(--panel); padding: 30px; border: 1px solid var(--border); }
        h1 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; color: #666; margin-bottom: 5px; }
        input, select { width: 100%; background: #111; border: 1px solid var(--border); padding: 10px; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: var(--accent); border: none; padding: 12px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .admin-area { border-top: 1px solid var(--border); margin-top: 20px; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Escala Renascer</h1>
    
    <div class="group"><label>DATA</label><input type="date" id="data"></div>
    <div class="group"><label>INTEGRANTE</label><select id="selectIntegrante"></select></div>
    <div class="group"><label>FUNÇÃO</label>
        <select id="funcao">
            <option>Cantora</option><option>Cantor</option><option>Backing vocal</option>
            <option>Guitarrista</option><option>Baterista</option><option>Tecladista</option><option>Baixista</option>
        </select>
    </div>
    <button onclick="registrar()">REGISTRAR ENSAIO</button>

    <div class="admin-area">
        <h1>Gerenciar Membros</h1>
        <input type="text" id="novoMembro" placeholder="Nome do novo integrante">
        <button onclick="addMembro()" style="background: #333; color: white;">ADICIONAR MEMBRO</button>
        <button onclick="excluirMembro()" style="background: #500; color: white; margin-top: 5px;">EXCLUIR SELECIONADO</button>
    </div>
</div>

<script>
    let membros = JSON.parse(localStorage.getItem('listaMembros')) || ["Márcia", "Estefany", "Isabelle", "Davi", "Paulinho", "Fernando", "Max"];

    function atualizarSelect() {
        const select = document.getElementById('selectIntegrante');
        select.innerHTML = membros.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function addMembro() {
        const nome = document.getElementById('novoMembro').value;
        if(nome) {
            membros.push(nome);
            localStorage.setItem('listaMembros', JSON.stringify(membros));
            atualizarSelect();
            document.getElementById('novoMembro').value = '';
        }
    }

    function excluirMembro() {
        const select = document.getElementById('selectIntegrante');
        membros = membros.filter(m => m !== select.value);
        localStorage.setItem('listaMembros', JSON.stringify(membros));
        atualizarSelect();
    }

    function registrar() {
        // Lógica de registro igual a anterior...
        alert("Ensaio registrado para: " + document.getElementById('selectIntegrante').value);
    }

    atualizarSelect();
</script>
</body>
</html>
