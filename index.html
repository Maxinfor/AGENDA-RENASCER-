<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Renascer - Cadastro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #555; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #219150; }
        .link-nav { display: block; text-align: center; margin-top: 20px; color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escala Renascer</h1>
    
    <label>Data do Ensaio</label>
    <input type="date" id="data">
    
    <label>Horário</label>
    <input type="time" id="horario">
    
    <label>Música</label>
    <input type="text" id="musica" placeholder="Nome da música">
    
    <label>Autor</label>
    <input type="text" id="autor" placeholder="Nome do autor">
    
    <label>Tom</label>
    <input type="text" id="tom" placeholder="Ex: Sol Maior">
    
    <label>Integrante</label>
    <input type="text" id="integrante" placeholder="Nome do membro">
    
    <label>Função</label>
    <select id="funcao">
        <option value="Tecladista">Tecladista</option>
        <option value="Baterista">Baterista</option>
        <option value="Vocalista">Vocalista</option>
        <option value="Baixista">Baixista</option>
        <option value="Guitarrista">Guitarrista</option>
        <option value="Violonista">Violonista</option>
        <option value="Backing vocal">Backing vocal</option>
    </select>

    <button onclick="registrar()">Cadastrar na Escala</button>
    <a href="historico.html" class="link-nav">Ver Banco de Dados (Histórico)</a>
</div>

<script>
    function registrar() {
        const novoEnsaio = {
            id: Date.now(),
            data: document.getElementById('data').value,
            horario: document.getElementById('horario').value,
            musica: document.getElementById('musica').value,
            autor: document.getElementById('autor').value,
            tom: document.getElementById('tom').value,
            nome: document.getElementById('integrante').value,
            funcao: document.getElementById('funcao').value
        };

        if(!novoEnsaio.data || !novoEnsaio.musica || !novoEnsaio.nome) {
            alert("Por favor, preencha os campos principais!");
            return;
        }

        let banco = JSON.parse(localStorage.getItem('bancoEscala')) || [];
        banco.push(novoEnsaio);
        localStorage.setItem('bancoEscala', JSON.stringify(banco));
        
        alert("Ensaio registrado com sucesso!");
        document.getElementById('integrante').value = '';
    }
</script>
</body>
</html>
